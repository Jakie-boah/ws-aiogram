services:
  test-ws:
    container_name: test-ws
    build:
      context: ../.

    volumes:
      - ../.:/app

    env_file:
      - .env.test

    command: >
      sh -c "uvicorn src.presentation.ws.main:app_factory --host 0.0.0.0 --port 8002 --reload"

    ports:
      - "8002:8002"

  test-bot:
    container_name: test-bot
    build:
      context: ../.

    volumes:
      - ../.:/app

    env_file:
      - .env.test
    command: >
      sh -c "uv run python -m src.presentation.bot.main"
  
  test-redis:
    container_name: test-redis
    image: redis:latest
    ports:
      - "6379:6379"



  test-amqp-api:
    container_name: test-amqp-api
    build:
      context: ../.

    volumes:
      - ../.:/app
    env_file:
      - .env.test

    command: sh -c "python src/presentation/amqp_api/main.py"

    ports:
      - "8003:8003"

    depends_on:
      test-rabbit:
        condition: service_healthy

  tests:
    container_name: tests
    build:
      context: ../.

    volumes:
      - ../.:/app
    env_file:
      - .env.test

    command: >
      sh -c "uv run pytest tests/src/application/use_cases/test_receive_client_message_use_case.py"

    depends_on:
      test-rabbit:
        condition: service_healthy
      test-postgres:
        condition: service_healthy

  test-rabbit:
    image: rabbitmq:4.3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "status" ]
      interval: 5s
      retries: 5
      timeout: 5s

  test-postgres:
    image: postgres:16-alpine
    container_name: test-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: test_chat_bridge
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "user", "-h", "test-postgres" ]
      interval: 10s
      timeout: 5s
      retries: 3
