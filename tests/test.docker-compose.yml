services:
  ws:
    container_name: ws
    build:
      context: ../.

    volumes:
      - ../.:/app

    env_file:
      - .env.test

    command: >
      sh -c "uvicorn src.presentation.ws.main:app_factory --host 0.0.0.0 --port 8002 --reload"

    ports:
      - "8002:8002"

  bot:
    container_name: bot
    build:
      context: ../.

    volumes:
      - ../.:/app

    env_file:
      - .env.test
    command: >
      sh -c "uv run python -m src.presentation.tg.main"
  
  test-redis:
    container_name: test-redis
    image: redis:latest
    ports:
      - "6379:6379"


  tests:
    container_name: tests
    build:
      context: ../.

    volumes:
      - ../.:/app
    env_file:
      - .env.test

    command: >
      sh -c "uv run pytest tests/src/"
